name: Reset demo account

on:
  workflow_dispatch:
  schedule:
    # 04:00 KST daily.
    - cron: "0 19 * * *"

permissions:
  contents: read

concurrency:
  group: reset-demo-account
  cancel-in-progress: false

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reset shared demo account
        env:
          API_BASE_URL: https://paperlens-backend-53ki.onrender.com
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PAPERLENS_DEMO_EMAIL: ${{ secrets.PAPERLENS_DEMO_EMAIL }}
          PAPERLENS_DEMO_PASSWORD: ${{ secrets.PAPERLENS_DEMO_PASSWORD }}
        run: python3 backend/scripts/reset_demo_account.py
