name: CI

# 푸시/PR 시 백엔드·프론트 테스트와 린트를 실행해 회귀를 막는다.
# 배포(deploy-pages.yml)와 분리된 검증 전용 워크플로.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    # 운영 저장소(PostgreSQL) 통합 테스트를 실제 DB에 대해 실행한다.
    # 자격증명은 docker-compose.postgres.yml과 동일하게 맞춘다.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: paperlens
          POSTGRES_USER: paperlens
          POSTGRES_PASSWORD: paperlens_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U paperlens -d paperlens"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PAPERLENS_TEST_DATABASE_URL: postgresql://paperlens:paperlens_dev@localhost:5432/paperlens
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest

  frontend:
    name: Frontend (eslint + vitest + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Test (vitest)
        run: npm test
      - name: Build (tsc + vite)
        run: npm run build
