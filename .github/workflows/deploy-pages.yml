name: Deploy frontend to GitHub Pages

# main 브랜치에 푸시될 때마다 프론트엔드를 빌드해 GitHub Pages로 배포한다.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건으로 제한(진행 중인 런은 취소하지 않고 큐잉)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        # 백엔드 API 주소는 저장소 변수(Settings > Secrets and variables > Actions > Variables)에서 주입.
        # 비어 있으면 상대경로 /api 를 쓰는데, Pages에는 백엔드가 없으므로 반드시 설정해야 한다.
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
