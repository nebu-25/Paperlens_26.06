name: Deploy frontend to GitHub Pages

# main 브랜치에 푸시될 때마다 프론트엔드를 빌드해 GitHub Pages로 배포한다.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건으로 제한(진행 중인 런은 취소하지 않고 큐잉)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Environment variables에 등록한 VITE_* 값은 해당 environment를 선언한 job에서만 vars로 노출된다.
    environment: github-pages
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify build variables
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: |
          missing=0
          for name in VITE_API_BASE_URL VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured for the github-pages environment or repository variables."
              missing=1
            fi
          done
          if [[ -n "$VITE_API_BASE_URL" && ! "$VITE_API_BASE_URL" =~ ^https?:// ]]; then
            echo "::error::VITE_API_BASE_URL must be an http(s) backend origin, for example https://paperlens-backend-53ki.onrender.com."
            missing=1
          fi
          if [[ -n "$VITE_SUPABASE_URL" && ! "$VITE_SUPABASE_URL" =~ ^https://.+\.supabase\.co/?$ ]]; then
            echo "::error::VITE_SUPABASE_URL must be the Supabase project URL, for example https://<project-ref>.supabase.co."
            missing=1
          fi
          if [[ -n "$VITE_SUPABASE_ANON_KEY" && "$VITE_SUPABASE_ANON_KEY" =~ ^https?:// ]]; then
            echo "::error::VITE_SUPABASE_ANON_KEY must be the anon/publishable key, not a URL."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Build
        # 백엔드/API/Auth 주소는 GitHub Pages environment variables 또는 저장소 variables에서 주입.
        # 비어 있으면 상대경로 /api 및 인증 비활성 상태로 빌드되므로 배포 설정을 확인해야 한다.
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
